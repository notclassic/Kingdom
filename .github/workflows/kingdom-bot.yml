name: Kingdom Bots (Audio y Notificaciones)

on:
  schedule:
    - cron: '*/3 * * * *' # Se ejecuta cada 3 minutos
  workflow_dispatch: # Te permite ejecutarlo a mano desde GitHub

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ejecutar Bot de Audio
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ASSEMBLYAI_KEY: ${{ secrets.ASSEMBLYAI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: notclassic
          GITHUB_REPO: Kingdom
        run: node bot_audio.js

      - name: Ejecutar Bot de Notificaciones
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: notclassic
          GITHUB_REPO: Kingdom
        run: node bot_notificaciones.js
